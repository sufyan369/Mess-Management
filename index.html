<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Are you a monna?</title>
<style>
  :root{
    --bg1:#ff9a8b;
    --bg2:#ff6a88;
    --bg3:#ffb86b;
    --ink:#2b1b3d;
    --card:#fff8f0;
    --pop:#ffe66d;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Comic Sans MS','Segoe UI',sans-serif;
    background:linear-gradient(135deg,var(--bg1),var(--bg2) 50%,var(--bg3));
    background-size:200% 200%;
    animation:gradientShift 6s ease infinite;
    overflow:hidden;
  }
  @keyframes gradientShift{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
  }

  .card{
    background:var(--card);
    padding:48px 40px;
    border-radius:28px;
    text-align:center;
    box-shadow:0 30px 60px rgba(0,0,0,.25);
    opacity:0;
    transform:translateY(60px) scale(.7) rotate(-8deg);
    animation:cardEntrance 1.1s cubic-bezier(.34,1.56,.64,1) .2s forwards;
    position:relative;
  }
  @keyframes cardEntrance{
    0%{opacity:0; transform:translateY(60px) scale(.7) rotate(-8deg);}
    60%{opacity:1; transform:translateY(-10px) scale(1.05) rotate(3deg);}
    100%{opacity:1; transform:translateY(0) scale(1) rotate(0deg);}
  }

  h1{
    margin:0 0 8px;
    font-size:2.4rem;
    color:var(--ink);
    opacity:0;
    animation:fadeUp .6s ease .9s forwards;
  }
  p.sub{
    margin:0 0 28px;
    color:#7a6a8a;
    opacity:0;
    animation:fadeUp .6s ease 1.05s forwards;
  }
  @keyframes fadeUp{
    from{opacity:0; transform:translateY(15px);}
    to{opacity:1; transform:translateY(0);}
  }

  .buttons{
    display:flex;
    gap:20px;
    justify-content:center;
    flex-wrap:wrap;
  }
  .yes{
    border:none;
    padding:16px 34px;
    font-size:1.2rem;
    font-weight:bold;
    border-radius:50px;
    cursor:pointer;
    background:linear-gradient(135deg,#7bf3a0,#34c98f);
    color:#0b3d2a;
    box-shadow:0 10px 20px rgba(52,201,143,.4);
    opacity:0;
    transform:scale(.5);
    animation:popIn .5s cubic-bezier(.34,1.56,.64,1) forwards;
    transition:transform .2s ease;
  }
  .yes:hover{ transform:scale(1.08) rotate(-2deg); }
  .yes:active{ transform:scale(.92); }
  .yes:nth-of-type(1){ animation-delay:1.3s; }
  .yes:nth-of-type(2){ animation-delay:1.45s; }
  @keyframes popIn{
    0%{opacity:0; transform:scale(.5);}
    70%{opacity:1; transform:scale(1.15);}
    100%{opacity:1; transform:scale(1);}
  }

  .burst{
    position:fixed;
    inset:0;
    pointer-events:none;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    z-index:10;
  }
  .ayyeee{
    font-size:7rem;
    font-weight:900;
    color:#fff;
    text-shadow:0 6px 0 #ff4f6e, 0 10px 25px rgba(0,0,0,.3);
    opacity:0;
    transform:scale(.2) rotate(-15deg);
    animation:bigPop .7s cubic-bezier(.34,1.56,.64,1) forwards;
  }
  @keyframes bigPop{
    0%{opacity:0; transform:scale(.2) rotate(-15deg);}
    60%{opacity:1; transform:scale(1.3) rotate(6deg);}
    100%{opacity:1; transform:scale(1) rotate(0deg);}
  }

  .emoji{
    position:fixed;
    top:-60px;
    font-size:2.5rem;
    animation:fall linear forwards;
    z-index:9;
  }
  @keyframes fall{
    to{ transform:translateY(110vh) rotate(360deg); }
  }
</style>
</head>
<body>

<div class="card">
  <h1>Are you a monna? 🥺</h1>
  <p class="sub">be honest Ummukulusu</p>
  <div class="buttons">
    <button class="yes" onclick="celebrate()">yes 😳</button>
    <button class="yes" onclick="celebrate()">yes fr fr 💯</button>
  </div>
</div>

<script>
function celebrate(){
  // big text
  const burst = document.createElement('div');
  burst.className = 'burst';
  burst.innerHTML = '<div class="ayyeee">AYYEEE 🎉</div>';
  document.body.appendChild(burst);

  // falling emoji confetti
  const emojis = ['🥳','😂','🔥','💀','✨','😭','🤣','🎊','👀','💅'];
  for(let i=0;i<35;i++){
    const span = document.createElement('span');
    span.className = 'emoji';
    span.textContent = emojis[Math.floor(Math.random()*emojis.length)];
    span.style.left = Math.random()*100 + 'vw';
    span.style.animationDuration = (1.5 + Math.random()*1.5) + 's';
    span.style.fontSize = (1.5 + Math.random()*2) + 'rem';
    document.body.appendChild(span);
    setTimeout(()=>span.remove(), 3200);
  }

  setTimeout(()=>burst.remove(), 2200);
}
</script>

</body>
</html>
